<svg xmlns="http://www.w3.org/2000/svg" width="500" height="600" viewBox="0 0 500 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Ambiente do escritório Magalhães &amp; Soares Advocacia">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E4D72"/>
      <stop offset="1" stop-color="#081827"/>
    </linearGradient>
    <radialGradient id="sglow" cx="0.3" cy="0.25" r="0.8">
      <stop offset="0" stop-color="#C2A36B" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#C2A36B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="500" height="600" fill="url(#sg)"/>
  <rect width="500" height="600" fill="url(#sglow)"/>
  <!-- estantes / livros estilizados -->
  <g opacity="0.85">
    <rect x="70" y="120" width="360" height="300" rx="6" fill="none" stroke="#C2A36B" stroke-opacity="0.30" stroke-width="1.5"/>
    <line x1="70" y1="220" x2="430" y2="220" stroke="#C2A36B" stroke-opacity="0.22" stroke-width="1.5"/>
    <line x1="70" y1="320" x2="430" y2="320" stroke="#C2A36B" stroke-opacity="0.22" stroke-width="1.5"/>
    <g fill="#C2A36B" fill-opacity="0.16">
      <rect x="86" y="140" width="20" height="70"/><rect x="112" y="150" width="20" height="60"/>
      <rect x="138" y="135" width="20" height="75"/><rect x="164" y="150" width="20" height="60"/>
      <rect x="190" y="142" width="20" height="68"/>
      <rect x="300" y="240" width="20" height="70"/><rect x="326" y="250" width="20" height="60"/>
      <rect x="352" y="235" width="20" height="75"/><rect x="378" y="248" width="20" height="62"/>
    </g>
  </g>
  <text x="250" y="500" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#8FA0B2" letter-spacing="4">NOSSO ESCRITÓRIO</text>
</svg>
